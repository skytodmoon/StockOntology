# Docker Compose 配置 - 本地数据库服务
# 启动命令: docker-compose up -d

services:
  # Neo4j 图数据库
  neo4j:
    image: neo4j:latest
    container_name: stock_ontology_neo4j
    ports:
      - "7474:7474"    # Neo4j HTTP 端口
      - "7687:7687"    # Neo4j Bolt 端口
    volumes:
      - ./docker/neo4j/data:/data
      - ./docker/neo4j/logs:/logs
      - ./docker/neo4j/plugins:/plugins
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_memory_pagecache_size=1G
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stock_network

  # PostgreSQL 数据库
  postgres:
    image: postgres:latest
    container_name: stock_ontology_postgres
    ports:
      - "5432:5432"    # PostgreSQL 端口
    volumes:
      - ./docker/postgres:/var/lib/postgresql
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=stock_ontology
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stock_network

  # TimescaleDB 时序数据库
  timescale:
    image: timescale/timescaledb:latest-pg18
    container_name: stock_ontology_timescale
    ports:
      - "5433:5432"    # TimescaleDB 端口（使用 5433 避免冲突）
    volumes:
      - ./docker/timescale:/var/lib/postgresql
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=stock_ontology
      - POSTGRES_HOST_AUTH_METHOD=trust
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stock_network

  # Redis 缓存
  redis:
    image: redis:7.2-alpine
    container_name: stock_ontology_redis
    ports:
      - "6379:6379"    # Redis 端口
    volumes:
      - ./docker/redis/data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stock_network

networks:
  stock_network:
    driver: bridge

# 注意：Celery Worker 和 Beat 在本地 Python 环境运行，不放在 Docker 中
# 使用 ./start.sh 启动时会自动启动 Celery 服务
